<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKELETON — Analisi Posturale</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="exercise-select">
        <div class="scan-line"></div>

        <!-- Torna a Fitora -->
        <a href="https://galaxyluca952.github.io/FITORA-2/" class="ex-back-link">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Fitora
        </a>

        <div class="ex-inner">

            <div class="ex-header">
                <div class="ex-logo">SKELETON</div>
                <div class="ex-tagline">Analisi posturale in tempo reale</div>
                <p class="ex-prompt">Scegli una modalità per iniziare</p>
            </div>

            <div class="ex-grid">

                <button class="ex-card" data-ex="inpiedi">
                    <div class="ex-fig-wrap">
                        <img class="ex-fig"
                            src="https://img.freepik.com/vettori-gratuito/icona-in-piedi-di-carattere-uomo_24877-81729.jpg?semt=ais_hybrid&w=740&q=80"
                            alt="postura in piedi" loading="lazy">
                    </div>
                    <div class="ex-card-info">
                        <span class="ex-name">IN PIEDI</span>
                        <span class="ex-desc">Colonna · Spalle · Fianchi</span>
                        <span class="ex-view">FRONTALE / PROFILO</span>
                    </div>
                </button>

                <button class="ex-card" data-ex="seduto">
                    <div class="ex-fig-wrap">
                        <img class="ex-fig"
                            src="https://img.magnific.com/premium-vector/man-sitting-flat-design-illustration_56102-1015.jpg?semt=ais_hybrid&w=740&q=80"
                            alt="postura seduto" loading="lazy">
                    </div>
                    <div class="ex-card-info">
                        <span class="ex-name">SEDUTO</span>
                        <span class="ex-desc">Schiena · Testa · Postura</span>
                        <span class="ex-view">PROFILO</span>
                    </div>
                </button>

                <button class="ex-card" data-ex="squat">
                    <div class="ex-fig-wrap">
                        <img class="ex-fig"
                            src="https://png.pngtree.com/png-vector/20220331/ourmid/pngtree-man-doing-squat-exercise-clipart-png-image_4517619.png"
                            alt="squat" loading="lazy">
                    </div>
                    <div class="ex-card-info">
                        <span class="ex-name">SQUAT</span>
                        <span class="ex-desc">Ginocchio · Schiena · Lean</span>
                        <span class="ex-view">PROFILO</span>
                    </div>
                </button>

                <button class="ex-card" data-ex="pushup">
                    <div class="ex-fig-wrap">
                        <img class="ex-fig"
                            src="https://media.istockphoto.com/id/1161576679/vector/push-ups-exercises-and-yoga-vector-illustration.jpg?s=612x612&w=0&k=20&c=AVOJNJKGUI4ytIR1VZX35eMVgDZ64Ww8LdXEaIj7S7w="
                            alt="push-up" loading="lazy">
                    </div>
                    <div class="ex-card-info">
                        <span class="ex-name">PUSH-UP</span>
                        <span class="ex-desc">Piano corpo · Core · Fianchi</span>
                        <span class="ex-view">PROFILO</span>
                    </div>
                </button>

            </div>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="loader-content">
            <div class="loader-ring"></div>
            <p class="loader-text">CARICAMENTO MODELLO...</p>
        </div>
    </div>

    <div id="viewport">
        <video id="video" playsinline></video>
        <canvas id="canvas"></canvas>

        <!-- Viewfinder corners -->
        <div class="vf-corners">
            <div class="vf-c tl"></div>
            <div class="vf-c tr"></div>
            <div class="vf-c bl"></div>
            <div class="vf-c br"></div>
        </div>

        <!-- Top bar -->
        <div id="topbar">
            <div class="tb-left">
                <!-- Torna alla selezione esercizi -->
                <button class="home-btn" id="back-btn" title="Torna alla selezione" aria-label="Torna alla selezione">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                        <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div class="brand">◈ SKELETON</div>
            </div>
            <div class="tb-center">
                <div id="exercise-badge" class="exercise-badge" data-ex="inpiedi">IN PIEDI</div>
                <span class="tb-sep">◆</span>
                <div id="view-badge" class="view-badge">FRONTALE</div>
            </div>
            <div class="tb-right">
                <div id="status-pill" class="status-pill">
                    <span id="status-dot" class="sdot"></span>
                    <span id="status-text">IN ATTESA</span>
                </div>
                <button id="voice-btn" class="voice-btn" title="Voce feedback">🔊</button>
            </div>
        </div>

        <!-- Spine angle badge -->
        <div id="angle-badge">
            <div class="badge-value" id="spine-angle-val">—°</div>
            <div class="badge-label" id="badge-lbl">COLONNA</div>
        </div>

        <!-- Rep counter badge -->
        <div id="rep-badge" class="hidden">
            <div class="badge-value" id="rep-count-val">0</div>
            <div class="badge-label">REPS</div>
        </div>

        <!-- Metrics panel -->
        <div id="metrics-panel">
            <div class="metrics-hdr">
                <span class="mh-dot"></span>
                <span>ANALISI</span>
            </div>
            <div class="metric-row" id="m-lat">
                <span class="m-icon">⟷</span>
                <span class="m-label">INCL. LAT.</span>
                <span class="m-val" id="v-lat">—</span>
            </div>
            <div class="metric-row" id="m-fwd">
                <span class="m-icon">↗</span>
                <span class="m-label" id="lbl-fwd">ASIMM. SPALLE</span>
                <span class="m-val" id="v-fwd">—</span>
            </div>
            <div class="metric-row" id="m-spalle">
                <span class="m-icon">⇌</span>
                <span class="m-label" id="lbl-spalle">ALIGN. ANCHE</span>
                <span class="m-val" id="v-spalle">—</span>
            </div>
            <div class="metric-row" id="m-extra">
                <span class="m-icon">◉</span>
                <span class="m-label" id="lbl-extra">—</span>
                <span class="m-val" id="v-extra">—</span>
            </div>
            <div class="metric-row" id="m-score">
                <span class="m-icon">◎</span>
                <span class="m-label">RILEVAMENTO</span>
                <span class="m-val" id="v-score">—</span>
            </div>
        </div>

        <!-- Warning banner -->
        <div id="warning-banner" class="hidden">
            <span id="warning-text"></span>
        </div>

        <!-- Good posture indicator -->
        <div id="good-banner" class="hidden">✓ POSTURA CORRETTA</div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
